# .github/workflows/lint-test.yml  (in the CHARTS repo)
#
# Helm chart-testing (ct) on pull requests: lint every changed chart, then spin
# up an ephemeral kind cluster and `helm install` + `helm test` it (the chart's
# templates/tests/* hooks). Configuration lives in ct.yaml at the repo root.
#
# This complements release.yml: lint-test.yml proves the charts INSTALL and pass
# their own tests; release.yml owns the SemVer-as-values guard and the
# tag + repository_dispatch on merge to the default branch.
name: lint-test
on:
  pull_request:
    paths: [charts/**]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [ -n "$changed" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint charts
        run: ct lint --config ct.yaml

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1

      - name: Install and test charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml
