apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
    automated:
      prune: true
      heal: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
              # Example app: podinfo (https://github.com/stefanprodan/podinfo),
              # a small Go microservice commonly used to demo GitOps.
              # The chart is expected at charts/podinfo in the private
              # {{ cookiecutter.repo_charts }} repository, tagged podinfo-<chartVersion>.
              - appName: podinfo
                releaseName: podinfo-qa
                targetRevision: podinfo-6.14.0
                environment: qa
          - clusters:
              selector:
                matchExpressions:
                - {key: 'argo-cd-cluster-name', operator: In, values: [cluster-a]}
  template:
    metadata:
      name: 'app-{{ "{{" }}.appName{{ "}}" }}-{{ "{{" }}.environment{{ "}}" }}-{{ "{{" }}index .metadata.labels "argo-cd-cluster-name"{{ "}}" }}'
    spec:
      project: default
      sources:
      - repoURL: 'ssh://git@github.com/{{ cookiecutter.repo_appsets }}'
        targetRevision: {{ cookiecutter.repo_appsets_branch }}
        ref: values
      - repoURL: 'ssh://git@github.com/{{ cookiecutter.repo_charts }}'
        path: 'charts/{{ "{{" }}.appName{{ "}}" }}'
        targetRevision: '{{ "{{" }}.targetRevision{{ "}}" }}'
        helm:
          releaseName: '{{ "{{" }}.releaseName{{ "}}" }}'
          ignoreMissingValueFiles: false
          valueFiles:
          - '$values/clusters/{{ "{{" }}index .metadata.labels "argo-cd-cluster-name"{{ "}}" }}/apps/{{ "{{" }}.environment{{ "}}" }}-{{ "{{" }}.appName{{ "}}" }}.yaml'
      destination:
        namespace: '{{ "{{" }}.environment{{ "}}" }}-targetns'
        name: '{{ "{{" }}.name{{ "}}" }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true  # Big CRDs.
