apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
    automated:
      prune: true
      heal: true
  generators:
    # One explicit entry per (app x cluster). Each entry pins its own chart
    # revision: dev tracks the charts repo's 'main' branch, while stage and prod
    # pin released tags (stage ahead of prod, so changes soak before promotion).
    # Applications are placed on clusters BY NAME.
    - list:
        elements:
        - appName: podinfo
          cluster: {{ cookiecutter.cluster_dev }}
          environment: dev
          releaseName: podinfo-dev
          targetRevision: main
        - appName: podinfo
          cluster: {{ cookiecutter.cluster_stage }}
          environment: stage
          releaseName: podinfo-stage
          targetRevision: podinfo-6.14.0
        - appName: podinfo
          cluster: {{ cookiecutter.cluster_prod }}
          environment: prod
          releaseName: podinfo-prod
          targetRevision: podinfo-6.13.0
  template:
    metadata:
      name: '{{ "{{" }}.appName{{ "}}" }}-{{ "{{" }}.environment{{ "}}" }}'
    spec:
      project: default
      sources:
      # 1) per-cluster values from this GitOps repo
      - repoURL: 'ssh://git@github.com/{{ cookiecutter.repo_appsets }}'
        targetRevision: {{ cookiecutter.repo_appsets_branch }}
        ref: values
      # 2) the application chart from the private chart repo
      - repoURL: 'ssh://git@github.com/{{ cookiecutter.repo_charts }}'
        path: 'charts/{{ "{{" }}.appName{{ "}}" }}'
        targetRevision: '{{ "{{" }}.targetRevision{{ "}}" }}'
        helm:
          releaseName: '{{ "{{" }}.releaseName{{ "}}" }}'
          ignoreMissingValueFiles: false
          valueFiles:
          - '$values/clusters/{{ "{{" }}.cluster{{ "}}" }}/apps/{{ "{{" }}.appName{{ "}}" }}.yaml'
      destination:
        name: '{{ "{{" }}.cluster{{ "}}" }}'
        namespace: '{{ "{{" }}.environment{{ "}}" }}-targetns'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true  # Big CRDs.
