apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
    automated:
      prune: true
      heal: true
  generators:
    - matrix:
        generators:
          # the add-on charts (public Helm repos), same versions on every cluster
          - list:
              elements:
              - appName: cert-manager
                chartRepoURL: https://charts.jetstack.io
                chartName: cert-manager
                releaseName: cert-manager
                namespace: cert-manager
                targetRevision: v1.20.3
              - appName: external-secrets
                chartRepoURL: https://charts.external-secrets.io
                chartName: external-secrets
                releaseName: external-secrets
                namespace: external-secrets
                targetRevision: 2.7.0
              - appName: metrics-server
                chartRepoURL: https://kubernetes-sigs.github.io/metrics-server/
                chartName: metrics-server
                releaseName: metrics-server
                namespace: kube-system
                targetRevision: 3.13.1
          # the target clusters, BY NAME
          - list:
              elements:
              - cluster: {{ cookiecutter.cluster_dev }}
              - cluster: {{ cookiecutter.cluster_stage }}
              - cluster: {{ cookiecutter.cluster_prod }}
  template:
    metadata:
      name: '{{ "{{" }}.appName{{ "}}" }}-{{ "{{" }}.cluster{{ "}}" }}'
    spec:
      project: default
      sources:
      # 1) per-cluster values from this GitOps repo (config, not charts)
      - repoURL: 'ssh://git@github.com/{{ cookiecutter.repo_appsets }}'
        targetRevision: {{ cookiecutter.repo_appsets_branch }}
        ref: values
      # 2) the chart, pulled from its PUBLIC upstream Helm repository
      - repoURL: '{{ "{{" }}.chartRepoURL{{ "}}" }}'
        chart: '{{ "{{" }}.chartName{{ "}}" }}'
        targetRevision: '{{ "{{" }}.targetRevision{{ "}}" }}'
        helm:
          releaseName: '{{ "{{" }}.releaseName{{ "}}" }}'
          ignoreMissingValueFiles: true
          valueFiles:
          - '$values/clusters/{{ "{{" }}.cluster{{ "}}" }}/addons/{{ "{{" }}.appName{{ "}}" }}.yaml'
      destination:
        name: '{{ "{{" }}.cluster{{ "}}" }}'
        namespace: '{{ "{{" }}.namespace{{ "}}" }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true  # required for cert-manager's large CRDs
