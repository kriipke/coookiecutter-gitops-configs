apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
    automated:
      prune: true
      heal: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
              # Public upstream Helm charts (no private chart repo). Per-cluster
              # value overrides still come from this GitOps repo under
              # clusters/<cluster>/addons/<addon>.yaml.
              - appName: cert-manager
                chartRepoURL: https://charts.jetstack.io
                chartName: cert-manager
                releaseName: cert-manager
                namespace: cert-manager
                targetRevision: v1.20.3
              - appName: external-secrets
                chartRepoURL: https://charts.external-secrets.io
                chartName: external-secrets
                releaseName: external-secrets
                namespace: external-secrets
                targetRevision: 2.7.0
              - appName: metrics-server
                chartRepoURL: https://kubernetes-sigs.github.io/metrics-server/
                chartName: metrics-server
                releaseName: metrics-server
                namespace: kube-system
                targetRevision: 3.13.1
          - clusters:
              selector:
                matchExpressions:
                - {key: 'argo-cd-cluster-name', operator: In, values: [cluster-a, cluster-b]}
  template:
    metadata:
      name: 'app-{{ "{{" }}.appName{{ "}}" }}-{{ "{{" }}index .metadata.labels "argo-cd-cluster-name"{{ "}}" }}'
    spec:
      project: default
      sources:
      # 1) values from this GitOps repo (private is fine - it's config, not charts)
      - repoURL: 'ssh://git@github.com/{{ cookiecutter.repo_appsets }}'
        targetRevision: {{ cookiecutter.repo_appsets_branch }}
        ref: values
      # 2) the chart, pulled from its PUBLIC upstream Helm repository
      - repoURL: '{{ "{{" }}.chartRepoURL{{ "}}" }}'
        chart: '{{ "{{" }}.chartName{{ "}}" }}'
        targetRevision: '{{ "{{" }}.targetRevision{{ "}}" }}'
        helm:
          releaseName: '{{ "{{" }}.releaseName{{ "}}" }}'
          ignoreMissingValueFiles: true
          valueFiles:
          - '$values/clusters/{{ "{{" }}index .metadata.labels "argo-cd-cluster-name"{{ "}}" }}/addons/{{ "{{" }}.appName{{ "}}" }}.yaml'
      destination:
        namespace: '{{ "{{" }}.namespace{{ "}}" }}'
        name: '{{ "{{" }}.name{{ "}}" }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true  # required for cert-manager's large CRDs
