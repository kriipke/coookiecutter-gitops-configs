apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # ApplicationSet-level syncPolicy governs how this controller manages the
  # generated Application *objects* - not how their workloads sync to clusters.
  # The only field that belongs here is preserveResourcesOnDeletion (the cluster
  # sync behaviour - automated/prune/selfHeal - lives on template.spec.syncPolicy
  # below).
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          # the add-on charts (public Helm repos), same versions on every cluster
          - list:
              elements:
              - appName: metrics-server
                chartRepoURL: https://kubernetes-sigs.github.io/metrics-server/
                chartName: metrics-server
                releaseName: metrics-server
                namespace: kube-system
                targetRevision: 3.13.1
          # the target clusters, BY NAME
          - list:
              elements:
              - cluster: {{ cookiecutter.cluster_dev }}
              - cluster: {{ cookiecutter.cluster_stage }}
              - cluster: {{ cookiecutter.cluster_prod }}
  template:
    metadata:
      name: '{{ "{{" }}.appName{{ "}}" }}-{{ "{{" }}.cluster{{ "}}" }}'
    spec:
      project: default
      sources:
      # 1) per-cluster values from this GitOps repo (config, not charts)
      - repoURL: 'ssh://git@github.com/{{ cookiecutter.repo_appsets }}'
        targetRevision: {{ cookiecutter.repo_appsets_branch }}
        ref: values
      # 2) the chart, pulled from its PUBLIC upstream Helm repository
      - repoURL: '{{ "{{" }}.chartRepoURL{{ "}}" }}'
        chart: '{{ "{{" }}.chartName{{ "}}" }}'
        targetRevision: '{{ "{{" }}.targetRevision{{ "}}" }}'
        helm:
          releaseName: '{{ "{{" }}.releaseName{{ "}}" }}'
          ignoreMissingValueFiles: true
          valueFiles:
          - '$values/clusters/{{ "{{" }}.cluster{{ "}}" }}/addons/{{ "{{" }}.appName{{ "}}" }}.yaml'
      destination:
        name: '{{ "{{" }}.cluster{{ "}}" }}'
        namespace: '{{ "{{" }}.namespace{{ "}}" }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
